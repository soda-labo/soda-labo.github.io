name: Deploy Astro site to GitHub Pages

on:
  # Production deploys happen on push to main after astro-redesign merges in.
  # The astro-redesign branch is also wired up so we can validate the workflow
  # end-to-end before the merge; remove that line once main is the source of
  # truth.
  push:
    branches: [main, astro-redesign]
  workflow_dispatch:

# Allow the deploy step to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs when a newer commit lands so we never deploy stale work.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
