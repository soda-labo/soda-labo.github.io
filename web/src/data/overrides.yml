didn-t-you-see-my-message-predicting-attentiveness-to-mobile-instant-messages:
  title: Didn’t You See My Message? Predicting Attentiveness to Mobile Instant Messages
  tags:
  - user-behavior
  link:
    url: http://dl.acm.org/authorize?N87787
    venue: Proceedings of the SIGCHI Conference on Human Factors in Computing Systems (CHI), 2014
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=11472524438583510373">240+ papers citing this work (Google scholar)</a>
