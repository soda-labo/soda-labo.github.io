  methods:
  - llm
  - nlp
  scholar_ids:
  - FYtw3zkAAAAJ:J-pR_7NvFogC
  description: Forecasting regional Airbnb activity matters for housing policy, but typical models look at single listings at single time points. We forecast Revenue, Reservation Days, and Number of Reservations
    at the regional level by combining listing features with LLM-generated embeddings of urban accessibility and human mobility, cutting RMSE and MAE by roughly 48% versus standard baselines.
