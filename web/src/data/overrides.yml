  news:
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=14234114717665916389">110+ papers citing this work (Google scholar)</a>
  authors: Jisun An, Daniele Quercia, Jon Crowcroft
  scholar_ids:
