  tags:
  - user-behavior
  scholar_ids:
  - FYtw3zkAAAAJ:mvPsJ3kp5DgC
  description: Identity fusion (the psychological merging of self with a group, ideology, or brand) has historically been measured with surveys. CLIFS uses cognitive linguistics and LLMs to detect implicit
    metaphors in text and score fusion automatically, matching survey instruments while scaling. As a proof of concept, it improves violence risk assessment by more than 240%.
  authors: Devin R. Wright, Jisun An, Yong-Yeol Ahn
  link:
