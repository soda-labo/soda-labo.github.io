efforts-towards-automatically-generating-personas-in-real-time-using-actual-user:
  title: Efforts towards automatically generating personas in real-time using actual user data
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:isC4tDSrTZIC
  - FYtw3zkAAAAJ:TFP_iSt0sucC
  description: Marketing personas are usually static, hand-built artifacts. We demonstrate an approach to generating and validating personas in real time from live user data, working with AJ+ (Al Jazeera's
    digital-native news channel). The persona narratives are assembled automatically from behavioral and demographic signals as they arrive.
novel-aspects-coming-from-the-directionality-of-online-relationships-a-case-stud:
  title: 'Novel aspects coming from the directionality of online relationships: a case study of Twitter by Haewoon Kwak, Changhyun Lee, Hosung Park, Hyunwoo Chun and Sue Moon with Ching …'
  tags:
  - user-behavior
  methods:
  - user-study
  platforms:
  - twitter
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:NaGl4SEjCO4C
  description: 'Twitter follows are directional: you can follow anyone without approval. We trace how that single design choice shapes Twitter''s topology (asymmetric, non-power-law), how information spreads
    via retweet, and how relationships dissolve over time. The article maps these directional dynamics and sketches open questions for information-diffusion research.'
toblend-token-level-blending-with-an-ensemble-of-llms-to-attack-ai-generated-tex:
  title: 'ToBlend: Token-Level Blending With an Ensemble of LLMs to Attack AI-Generated Text Detection'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:NJ774b8OgUMC
  - FYtw3zkAAAAJ:fQNAKQ3IYiAC
  description: 'Detectors of AI-generated text are quietly competing against attacks that paraphrase or swap words. ToBlend goes further: it samples tokens randomly from an ensemble of LLMs, producing text
    that drops most detectors'' performance significantly while human raters confirm quality holds. We also release a fine-tuned Llama-3.1 detector tuned to catch ToBlend output.'
  authors: Fan Huang, Haewoon Kwak, Jisun An
  link:
    url: https://arxiv.org/abs/2402.11167
    venue: arXiv (Cornell University)
  image: toblend-token-level-blending-with-an-ensemble-of-llms-to-att.webp
token-ensemble-text-generation-on-attacking-the-automatic-ai-generated-text-dete:
  title: 'Token-Ensemble Text Generation: On Attacking the Automatic AI-Generated Text Detection'
  tags:
  - llms-responsible-ai
  scholar_ids:
  - dcjrz5MAAAAJ:5awf1xo2G04C
  - FYtw3zkAAAAJ:08ZZubdj9fEC
  description: Can AI-text detectors survive smarter adversaries? We propose ToBlend, which generates text by randomly sampling next tokens from multiple candidate LLMs. The blended output sharply degrades
    most mainstream detectors while staying fluent to human evaluators, exposing a robustness gap and motivating a fine-tuned Llama3.1 defender.
  authors: Fan Huang, Haewoon Kwak, Jisun An
  link:
    url: https://www.semanticscholar.org/paper/727cc936ca812d1c311189babb61db5c7d53d591
method-system-and-computer-readable-storage-mediums-for-estimating-a-route:
  title: Method, system and computer-readable storage mediums for estimating a route
  tags:
