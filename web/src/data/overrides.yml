a-benchmark-for-zero-shot-belief-inference-in-large-language-models:
  title: 'What Helps Language Models Predict Human Beliefs: Demographics or Prior Stances?'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  - dataset
  scholar_ids:
  - dcjrz5MAAAAJ:Fu2w8maKXqMC
  - FYtw3zkAAAAJ:wbdj-CoPYUoC
  description: 'When an LLM predicts someone''s beliefs, what matters more: who they are (demographics) or what else they believe (prior stances)? Testing open-weight LLMs on online-debate data under four
    conditions, we find both signals improve prediction, but their relative value varies sharply across belief domains.'
  authors: Joseph Malone, Rachith Aiyappa, Byunghwee Lee, Haewoon Kwak, Jisun An, Yong-Yeol Ahn
  link:
