has-much-potential-but-biased-exploring-the-scholarly-landscape-in-twitter:
  title: 'Has Much Potential but Biased: Exploring the Scholarly Landscape in Twitter'
  tags:
  - bias-fairness
  platforms:
  - twitter
  link:
    url: https://dl.acm.org/doi/10.1145/2567948.2576956
    venue: Proceedings of the 23rd International Conference on World Wide Web Companion, 2014
  authors: Haewoon Kwak, Jonggun Lee (poster)
  scholar_ids:
  - dcjrz5MAAAAJ:k_IJM867U9cC
  description: Can Twitter measure a paper's scientific impact? We track how 75,677 research papers from the top 100 journals get shared on Twitter (403,165 tweets by 142,743 users over 135 days). Twitter's
    reach for scholarly content is real, but attention is highly skewed toward a small subset of top journals, limiting its value as a fair impact signal.
sharing-political-news-the-balancing-act-of-intimacy-and-socialization-in-select:
  title: 'Sharing political news: the balancing act of intimacy and socialization in selective exposure'
  tags:
  - news-journalism
  link:
    url: https://link.springer.com/article/10.1140/epjds/s13688-014-0012-2
    venue: EPJ Data Science volume 3, Article number 12, 2014
  authors: Jisun An, Daniele Quercia, Meeyoung Cha, Krishna Gummadi, Jon Crowcroft
  scholar_ids:
  - FYtw3zkAAAAJ:5nxA0vEk-isC
  description: Why do people share certain political articles and not others? We propose a Political News Sharing model integrating gratification, selective exposure, socialization, and trust/intimacy.
    On Twitter data, sharing is driven by what one agrees with (selective exposure) but also by source credibility and informativeness, and users sometimes share opposing articles when those match their
    followers' leanings.
