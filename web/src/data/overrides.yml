vulnerability-of-llms-belief-systems-llms-belief-resistance-check-through-strate:
  title: Vulnerability of LLMs' Belief Systems? LLMs Belief Resistance Check Through Strategic Persuasive Conversation Interventions
  tags:
  - llms-responsible-ai
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:kzcrU_BdoSEC
  - FYtw3zkAAAAJ:HE397vMXCloC
  description: Are LLMs persuaded out of their beliefs? Using the Source–Message–Channel–Receiver (SMCR) communication framework across six mainstream LLMs and three domains (facts, medical QA, social bias),
    we measure how stable each model's stated beliefs are under persuasive pressure. The smallest model flips on 82.5% of attempts at the first turn. Counterintuitively, asking models to verbalize confidence
    makes them more vulnerable.
  authors: Fan Huang, Haewoon Kwak, Jisun An
  link:
    url: https://www.semanticscholar.org/paper/433bd18f35bca2159696aa47146bfbe1e24056ba
    venue: ACL Findings
xchoice-explainable-evaluation-of-ai-human-alignment-in-llm-based-constrained-ch:
  title: 'XChoice: Explainable Evaluation of AI-Human Alignment in LLM-based Constrained Choice Decision Making'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:7T2F9Uy0os0C
  - FYtw3zkAAAAJ:bnK-pcrLprsC
  description: 'AI-human alignment is usually measured by outcome agreement (accuracy, F1). XChoice fits a mechanism-based decision model to both human and LLM choices, recovering interpretable parameters:
    which factors matter, how sensitive each is to constraints, what trade-offs get made. Applied to U.S. time-use data, XChoice reveals systematic misalignment concentrated in specific demographic subgroups.'
  authors: Weihong Qi, Fan Huang, Rasika Muralidharan, Jisun An, Haewoon Kwak
  link:
    url: https://arxiv.org/abs/2601.11286
