can-lessons-from-human-teams-be-applied-to-multi-agent-systems-the-role-of-struc:
  title: Can Lessons From Human Teams Be Applied to Multi-Agent Systems? The Role of Structure, Diversity, and Interaction Dynamics
  tags:
  - user-behavior
  - bias-fairness
  scholar_ids:
  - dcjrz5MAAAAJ:tKAzc9rXhukC
  - FYtw3zkAAAAJ:V3AGJWp-ZtQC
  description: What does team science say about multi-agent LLM systems? We test three core team-science variables (structure, diversity, interaction dynamics) across four reasoning tasks. Flat teams beat
    hierarchical ones, diversity has nuanced effects, and agents are overconfident before tasks but more reflective afterward, with both appreciation for collaboration and difficulty integrating.
  authors: Rasika Muralidharan, Haewoon Kwak, Jisun An
  link:
