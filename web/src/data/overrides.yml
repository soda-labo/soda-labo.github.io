knowledge-and-anxiety-about-covid-19-in-the-state-of-qatar-and-the-middle-east-a:
  title: Knowledge and Anxiety about COVID-19 in the State of Qatar, and the Middle East and North Africa Region—A Cross Sectional Study
  tags:
  - user-behavior
  - digital-health
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:yD5IFk8b50cC
  - FYtw3zkAAAAJ:NhqRSupF_l8C
  description: How well-informed were people about COVID-19 in the early months, and how anxious did the gaps make them? We surveyed 1,658 respondents (general public and healthcare workers) in Qatar and
    the MENA region in April to June 2020. Healthcare workers had much higher COVID knowledge (63% vs 30%) and lower anxiety. The general public dramatically overestimated their fatality risk.
enhancing-stance-classification-on-social-media-using-quantified-moral-foundatio:
  title: Enhancing stance classification on social media using quantified moral foundations
  tags:
  - beliefs-opinions
  scholar_ids:
  - FYtw3zkAAAAJ:LPZeul_q3PIC
  description: Stance detection usually looks at message text alone. We add Moral Foundations Theory features (theoretically-derived dimensions of an individual's moral concerns) on top of standard semantic
    features, using both traditional ML and LLMs. Encoding moral foundations improves classification and illuminates which moral foundations associate with which online stances.
  authors: Hong Zhang, Quoc-Nam Nguyen, Prasanta Bhattacharya, Wei Gao, Liang Ze Wong, Brandon Siyuan Loh, Joseph J. P. Simons, Jisun An
  link:
    url: https://arxiv.org/abs/2310.09848
    venue: arXiv (Cornell University)
  image: enhancing-stance-classification-on-social-media-using-quanti.webp
leveraging-social-analytics-data-for-identifying-customer-segments-for-online-ne:
  title: Leveraging Social Analytics Data for Identifying Customer Segments for Online News Media
  tags:
  - news-journalism
  platforms:
  - news-media
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:aqlVkmm33-oC
  description: We propose a methodology to extract meaningful customer segments from large-scale social-media interaction data, mapping behavioral segments to demographic ones in near-real time. Implemented
    as a working system processing tens of millions of interactions, the approach automatically generates personas suitable for marketing strategy, ad planning, and product development.
apparatus-and-method-for-processing-contents-using-routing-table:
  title: Apparatus and method for processing contents using routing table
