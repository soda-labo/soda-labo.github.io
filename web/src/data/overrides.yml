  title: Are personas done? Evaluating their usefulness in the age of digital analytics
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:YsMSGLbcyi4C
  description: 'Has the rise of real-time online analytics made personas obsolete? We weigh the arguments for and against persona use in an age of fine-grained user data, and argue that data-driven personas
    occupy a useful middle ground: capturing the breadth of aggregate analytics while keeping the interpretability of individual-level profiles. We sketch how persona practice must evolve to survive.'
