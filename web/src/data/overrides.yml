  tags:
  - networks-influence
  methods:
  - networks
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:RGFaLdJalmkC
  description: 'When should you post to maximize attention across a geographically scattered audience? We formalize the broadcast scheduling problem and characterize three behavioral phenomena that constrain
    it: information overload, bursty circadian rhythms, and (newly defined) monotony aversion. Together they reveal that timeline posts are consumed in chunks, not piecemeal.'
