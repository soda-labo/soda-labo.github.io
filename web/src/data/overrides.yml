  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:4JMBOYKVnBMC
maang-manga-characterizing-spontaneous-ideation-contest-on-social-media-case-stu:
  title: 'MAANG? MANGA? Characterizing Spontaneous Ideation Contest on Social Media: Case Study on the Name Change of Facebook to Meta'
  tags:
  - user-behavior
  methods:
  - user-study
  platforms:
  - facebook
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:bnK-pcrLprsC
  - FYtw3zkAAAAJ:SP6oXDckpogC
  description: When Facebook became Meta, Twitter users spontaneously started proposing new acronyms for Big Tech ('MAANG,' 'MANGA,' and many more). We trace how candidates were proposed, spread, and judged,
    finding that early posters had fewer followers than later spreaders, rankings shifted slowly, and replies introduced most new ideas at the first depth.
system-and-method-for-extracting-users-of-similar-interests-between-various-type:
  title: System and method for extracting users of similar interests between various types of web servers
  tags:
