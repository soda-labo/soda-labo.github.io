  image: can-lessons-from-human-teams-be-applied-to-multi-agent-syste.webp
quantifying-gender-stereotypes-in-japan-between-1900-and-1999-with-word-embeddin:
  title: Quantifying Gender Stereotypes in Japan between 1900 and 1999 with Word Embeddings
  tags:
  - bias-fairness
  methods:
  - nlp
  scholar_ids:
  - dcjrz5MAAAAJ:W5xh706n7nkC
  - FYtw3zkAAAAJ:kRWSkSYxWN8C
  description: How did gender stereotypes shift in Japan across the 20th century? We train 100 year-specific word embeddings on Japanese corpora from 1900 to 1999 and trace stereotype strength in the Home,
    Work, and Politics domains. Work and Politics became more female-stereotyped over time, but Home did too, suggesting women came to be seen as occupying multiple roles rather than swapping them.
  authors: Shintaro Sakai, Haewoon Kwak, Jisun An, Akira Matsui
  link:
