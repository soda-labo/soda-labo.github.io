estimating-homophily-in-social-networks-using-dyadic-predictions:
  title: Estimating Homophily in Social Networks Using Dyadic Predictions
  tags:
  - networks-influence
  methods:
  - networks
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:f2IySw72cVMC
  description: 'Researchers often estimate homophily from node-level predictions (gender or ethnicity from names), but the math doesn''t work: bias in predictions cascades into bias in homophily estimates.
    We show estimation should be treated as a dyadic prediction problem, propose an ''ego-alter'' approach, and demonstrate that node-classification accuracy is a poor indicator of homophily-estimation
    accuracy.'
privacybench-a-conversational-benchmark-for-evaluating-privacy-in-personalized-a:
  title: 'PrivacyBench: A Conversational Benchmark for Evaluating Privacy in Personalized AI'
  tags:
  - llms-responsible-ai
  methods:
  - dataset
  scholar_ids:
  - FYtw3zkAAAAJ:5ugPr518TE4C
  description: Personalized AI agents must access private data (emails, chats, purchases) to be useful, but they can leak it. PrivacyBench is a benchmark with conversational scenarios containing embedded
    secrets. RAG assistants leak secrets in up to 26.6% of conversations; a privacy-aware prompt cuts this to 5.1%, but retrieval still pulls sensitive data indiscriminately.
  authors: Srija Mukhopadhyay, Sathwik Reddy, Shruthi Muthukumar, Jisun An, Ponnurangam Kumaraguru
  link:
    url: http://arxiv.org/abs/2512.24848
    venue: ArXiv.org
  image: privacybench-a-conversational-benchmark-for-evaluating-priva.webp
leveraging-online-social-media-data-for-persona-profiling:
  title: Leveraging Online Social Media Data for Persona Profiling
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:RYcK_YlVTxYC
  description: Persona profiles for product or content development are typically hand-crafted, slow, and limited by what creators imagine. We propose a methodology to build personas directly from large-scale
    online social-media data, integrating demographic and behavioral signals to characterize user segments and represent them as detailed, narrative-style profiles.
a-social-transitivity-based-data-dissemination-scheme-for-opportunistic-networks:
  title: A social transitivity-based data dissemination scheme for opportunistic networks
  tags:
  - networks-influence
  methods:
  - networks
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:qxL8FJ1GzNcC
  description: Social-based routing in opportunistic networks usually considers only direct delivery, ignoring transitive paths through intermediates. We add social transitivity as a forwarding metric and
    only forward when total utility crosses a threshold (avoiding useless transmissions). On real-trace simulations, the scheme improves delivery ratio and latency over SimBetTS while cutting overhead 30%.
interference-aware-routing-protocol-in-multi-radio-wireless-mesh-networks:
  title: Interference-aware routing protocol in multi-radio wireless mesh networks
  tags:
  - networks-influence
  methods:
  - networks
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:r0BpntZqJG4C
  description: Wireless mesh networks gain capacity from using multiple radios per router, but channel assignment is hard when nearby networks also use those channels. We propose an interference-aware channel-assignment
    algorithm based on a multi-radio conflict graph, and demonstrate over 40% performance gains in an IEEE 802.11 testbed and extensive simulations.
multiple-areal-feature-aware-transportation-demand-prediction:
  title: Multiple Areal Feature Aware Transportation Demand Prediction
  tags:
  - user-behavior
  scholar_ids:
  - FYtw3zkAAAAJ:8AbLer7MMksC
  description: Short-term transportation demand prediction guides scheduling, fleet sizing, and transit-network design. Most models use one or two areal features; cities need many (land use, sociodemographics,
    POI distribution). Our ST-MFGCRN model fuses multiple areal features via sentinel attention, beating state-of-the-art baselines by 7 to 8% on BusDJ and TaxiBJ datasets.
  authors: Sumin Han, Jisun An, Y. Park, Suji Kim, Kitae Jang, Dongman Lee
  link:
    url: https://arxiv.org/abs/2408.12890
    venue: arXiv.org
  image: multiple-areal-feature-aware-transportation-demand-predictio.webp
improving-real-estate-appraisal-with-poi-integration-and-areal-embedding:
  title: Improving Real Estate Appraisal with POI Integration and Areal Embedding
  tags:
  - user-behavior
  methods:
  - nlp
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:tOudhMTPpwUC
  description: Two underused signals can sharpen house-price prediction. First, Points of Interest (POIs) carry more weight than commonly assumed. Second, road-network-based areal embeddings encode spatial
    context that pure coordinates miss. Our AMMASI model combines both via masked multi-head attention over geographically and feature-wise similar houses, outperforming existing baselines.
cogbias-measuring-and-mitigating-cognitive-bias-in-large-language-models:
  title: 'CogBias: Measuring and Mitigating Cognitive Bias in Large Language Models'
  tags:
  - llms-responsible-ai
  - bias-fairness
  methods:
  - llm
  scholar_ids:
  - FYtw3zkAAAAJ:tkaPQYYpVKoC
  description: LLMs show cognitive biases in behavior, but where are those biases encoded internally, and can they be removed? We introduce CogBias, a benchmark covering four bias families (Judgment, Information
    Processing, Social, Response), and show via linear probes that biases occupy separable directions in activation space. Activation steering reduces bias 26 to 32% with minimal capability loss.
  authors: Fan Huang, Songheng Zhang, Haewoon Kwak, Jisun An
  link:
    url: http://arxiv.org/abs/2604.01366
    venue: ArXiv.org
  image: cogbias-measuring-and-mitigating-cognitive-bias-in-large-lan.webp
urban-vibrancy-embedding-and-application-on-traffic-prediction:
  title: Urban Vibrancy Embedding and Application on Traffic Prediction
  tags:
  - user-behavior
  methods:
  - nlp
  scholar_ids:
  - FYtw3zkAAAAJ:VOx2b1Wkg3QC
  description: Urban 'vibrancy' (the dynamic human activity in a place) is well-measured by floating-population data but rarely fed into traffic models. We use VAEs to compress floating-population data
    into Urban Vibrancy embeddings, then forecast future embeddings with LSTMs and feed them into traffic models (RNN, DCRNN, GTS, GMAN), improving accuracy and responsiveness across the board.
  authors: Sumin Han, Jisun An, Dongman Lee
  link:
    url: https://arxiv.org/abs/2602.21232
    venue: Open MIND
  image: urban-vibrancy-embedding-and-application-on-traffic-predicti.webp
