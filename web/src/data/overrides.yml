somatic-in-the-east-psychological-in-the-west-investigating-clinically-grounded-:
  title: 'Somatic in the East, Psychological in the West?: Investigating Clinically-Grounded Cross-Cultural Depression Symptom Expression in LLMs'
  tags:
  - llms-responsible-ai
  - digital-health
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:_Ybze24A_UAC
  - FYtw3zkAAAAJ:q3oQSFYPqjQC
  description: Clinical research finds Western depression patients tend to report psychological symptoms while Eastern patients report somatic ones. We test whether LLMs (now used in mental health) reproduce
    this cultural pattern. They mostly don't in English; prompting in Chinese, Japanese, or Hindi helps somewhat, but a strong culturally-invariant symptom hierarchy overrides the cultural cues.
  authors: Shintaro Sakai, Jisun An, Migyeong Kang, Haewoon Kwak
  link:
    url: https://arxiv.org/abs/2508.03247
    venue: ACL Workshop on Cross-Cultural Considerations in NLP (C3NLP), 2026
  image: somatic-in-the-east-psychological-in-the-west-investigating-.webp
visualizing-a-personal-timeline-by-adding-multiple-social-contexts:
  title: Visualizing a personal timeline by adding multiple social contexts
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:ULOm3_A8WrAC
  description: 'Twitter timelines mix many social contexts: family, classmates, teammates. We add three dimensions of social context (community membership, key persons, interesting tweets) to a personal
    timeline visualization, so readers can see why a tweet exists in the stream. Our prototype demonstrates how these layers can be woven together.'
casfi-data-sharing-platform:
  title: CASFI data sharing platform
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:O3NaXMp0MMsC
  description: Measurement-based research depends on managing large-scale datasets and their metadata, but existing Internet data archives are siloed across institutions with different interfaces. We present
    CASFI, a data-sharing platform that consolidates measurement data and metadata to make scattered repositories easier to find and use for the research community.
synsym-a-synthetic-data-generation-framework-for-psychiatric-symptom-identificat:
  title: 'SynSym: A Synthetic Data Generation Framework for Psychiatric Symptom Identification'
  tags:
  - llms-responsible-ai
  - digital-health
  methods:
  - llm
  - dataset
  link:
    url: https://dl.acm.org/doi/abs/10.1145/3770854.3785698
    venue: Proceedings of the 32nd ACM SIGKDD Conference on Knowledge Discovery and Data Mining (KDD), 2026
  scholar_ids:
  - dcjrz5MAAAAJ:_Re3VWB3Y0AC
  - FYtw3zkAAAAJ:Y5dfb0dijaUC
  description: Mental-health symptom datasets are slow and expensive to build, limiting how well models generalize to real, diverse user posts. SynSym is an LLM-based framework that generates synthetic
    symptom training data by expanding each symptom into sub-concepts, varying linguistic style, and modeling co-occurrence. Models trained on SynSym data match or exceed those trained on real data.
  authors: Migyeong Kang, Jihyun Kim, Hyolim Jeon, Sunwoo Hwang, Jihyun An, Yonghoon Kim, Haewoon Kwak, Jisun An, Jinyoung Han
  image: synsym-a-synthetic-data-generation-framework-for-psychiatric.webp
