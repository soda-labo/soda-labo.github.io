plurule-a-benchmark-for-moderating-pluralistic-communities-on-social-media:
  title: 'PluRule: A Benchmark for Moderating Pluralistic Communities on Social Media'
  tags:
  - online-harm
  methods:
  - dataset
  platforms:
  - reddit
  scholar_ids:
  - dcjrz5MAAAAJ:35r97b3x0nAC
  description: 'Different online communities have different rules: what gets you banned from one subreddit may be the norm in another. PluRule is a multimodal, multilingual benchmark with 13,371 rule violations
    across 1,989 Reddit communities, 2,885 rules, and 9 languages. Even GPT-5.2 performs only slightly better than a trivial baseline, exposing pluralistic moderation as a fundamental challenge.'
  authors: Zoher Kachwala, Bao Tran Truong, Rasika Muralidharan, Haewoon Kwak, Jisun An, Filippo Menczer
  link:
    url: https://arxiv.org/abs/2605.17187
    venue: ACL
  image: plurule-a-benchmark-for-moderating-pluralistic-communities-o.webp
when-behavior-is-not-enough-identity-biases-in-human-ai-creative-collaboration:
  title: 'When Behavior Is Not Enough: Identity Biases in Human-AI Creative Collaboration'
  tags:
  - llms-responsible-ai
  - bias-fairness
  scholar_ids:
  - dcjrz5MAAAAJ:fEOibwPWpKIC
  - FYtw3zkAAAAJ:_B80troHkn4C
  description: When AI joins a creative collaboration, does behaving cooperatively erase identity-based bias against it? In a turn-based collaborative drawing study (N=30), participants worked with a human
    confederate believed to be either human or AI. Cooperative behavior improved overall perceptions, but creativity ratings consistently favored human partners despite identical behavior. Identity bias
    persists.
  authors: Hyunseon Won, Haewoon Kwak, Jisun An, Jinyoung Han
  link:
    url: https://doi.org/10.1145/3772363.3799001
if-i-change-your-eyes-are-you-still-you-identity-thresholds-in-deepfake-percepti:
  title: If I Change Your Eyes, Are You Still You? Identity Thresholds in Deepfake Perception
  tags:
  - user-behavior
  - online-harm
  methods:
  - user-study
  scholar_ids:
  - dcjrz5MAAAAJ:-_dYPAW6P2MC
  - FYtw3zkAAAAJ:PELIpwtuRlgC
  description: Deepfake harm depends on the moment a viewer perceives the synthetic face as a specific victim, but where that threshold sits is undefined. With 102 participants and 162 manipulated stimuli,
    we find eyes are the dominant identity cue, that pairing eyes with one more feature triggers identity perception, and that human-AI misalignment peaks exactly at that threshold.
  authors: Chaewon Kang, Youjin Lee, Haewoon Kwak, Jisun An, Jinyoung Han
  link:
    url: https://doi.org/10.1145/3772363.3798341
understanding-moral-reasoning-trajectories-in-large-language-models-toward-probi:
  title: 'Understanding Moral Reasoning Trajectories in Large Language Models: Toward Probing-Based Explainability'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:evX43VCCuoAC
  - FYtw3zkAAAAJ:eMMeJKvmdy0C
  description: How consistently do LLMs apply ethical frameworks across reasoning steps? We introduce moral reasoning trajectories (sequences of framework invocations) and analyze them across six models.
    Over half of consecutive steps switch frameworks; only ~17% of trajectories stay consistent. Unstable trajectories are more vulnerable to persuasive attacks, and linear probes localize framework encoding
    to specific layers.
  authors: Fan Huang, Haewoon Kwak, Jisun An
  link:
    url: http://arxiv.org/abs/2603.16017
    venue: ArXiv.org
  image: understanding-moral-reasoning-trajectories-in-large-language.webp
llms-can-infer-political-alignment-from-online-conversations:
  title: LLMs Can Infer Political Alignment from Online Conversations
  tags:
  - llms-responsible-ai
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:tzM49s52ZIMC
  - FYtw3zkAAAAJ:AXPGKjj_ei8C
  description: Innocuous online preferences (the bands you follow, the slang you use) can reveal sensitive traits. We show that LLMs reliably infer hidden political alignment from DebateOrg and Reddit conversations,
    outperforming traditional ML. Accuracy improves further when text-level inferences aggregate to the user level and when we use politics-adjacent domains, underscoring a serious privacy risk.
  authors: Byunghwee Lee, Sangyeon Kim, Filippo Menczer, Yong-Yeol Ahn, Haewoon Kwak, Jisun An
  link:
    url: http://arxiv.org/abs/2603.11253
    venue: ArXiv.org
  image: llms-can-infer-political-alignment-from-online-conversations.webp
cross-cultural-differences-in-public-discourse-on-covid-19-vaccination-in-the-un:
  title: 'Cross-Cultural Differences in Public Discourse on COVID-19 Vaccination in the United States and South Korea: Cross-Sectional Analysis Using Natural Language Processing'
  tags:
  - digital-health
  methods:
  - nlp
  scholar_ids:
  - dcjrz5MAAAAJ:2KloaMYe4IUC
  description: How does public discourse around COVID-19 vaccines differ between the United States and South Korea? Analyzing nearly 8,000 question-answer pairs from Quora and Naver Knowledge-iN, we apply
    NLP to surface topical and sentiment differences. Both countries share concerns about side effects and efficacy, but diverge sharply on which questions get most attention.
  authors: Sangpil Youm, Sou Hyun Jang, Haewoon Kwak, Jaeyoung Choi, Yong Jeong Yi
  link:
    url: https://doi.org/10.2196/84791
    venue: JMIR Formative Research
zero-shot-stance-detection-in-practice-insights-on-training-prompting-and-decodi:
  title: 'Zero-shot stance detection in practice: insights on training, prompting, and decoding with a capable lightweight LLM'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  - nlp
  scholar_ids:
  - dcjrz5MAAAAJ:ZfRJV9d4-WMC
  - FYtw3zkAAAAJ:Mojj43d5GZwC
  description: Can LLMs do stance detection on tweets without any fine-tuning? Using FlanT5-XXL with SemEval 2016 and P-Stance datasets, we find zero-shot prompting matches or beats fine-tuned baselines.
    Performance varies with prompt phrasing, decoding strategy, and a measurable positivity bias, and we surface cases where the LLM over-commits to a stance when none is actually present.
  authors: Rachith Aiyappa, Shruthi Senthilmani, Jisun An, Haewoon Kwak, Yong-Yeol Ahn
  link:
