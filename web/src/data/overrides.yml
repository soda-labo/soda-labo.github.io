a-cross-cultural-comparison-of-llm-based-public-opinion-simulation-evaluating-ch:
  title: 'A Cross-Cultural Comparison of LLM-based Public Opinion Simulation: Evaluating Chinese and U.S. Models on Diverse Societies'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  scholar_ids:
  - dcjrz5MAAAAJ:uLbwQdceFCQC
  - FYtw3zkAAAAJ:t6usbXjVLHcC
  - FYtw3zkAAAAJ:BrmTIyaxlBUC
  description: Can LLMs realistically simulate public opinion across different cultures? Comparing DeepSeek-R1/V3 with Qwen2.5, GPT-4o, and Llama-3.3 against survey data from the U.S. (ANES) and China (Zuobiao),
    we find performance varies sharply by topic and demographic, and that all models over-generalize within demographic groups, defaulting to a 'representative' voice.
  authors: Weihong Qi, Fan Huang, Jisun An, Haewoon Kwak
  link:
    url: https://doi.org/10.1109/ICDMW69685.2025.00023
    venue: 2025 IEEE International Conference on Data Mining Workshops (ICDMW)
scheduling-broadcasts-in-a-network-of-timelines:
