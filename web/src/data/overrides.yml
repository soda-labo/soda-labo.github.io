  title: A social relation aware routing protocol for mobile ad hoc networks
  tags:
  - networks-influence
  methods:
  - networks
  hide: true
  scholar_ids:
  - FYtw3zkAAAAJ:d1gkVwhDpl0C
  - FYtw3zkAAAAJ:O3NaXMp0MMsC
  description: In mobile ad-hoc networks built for content sharing, similar interests are a good predictor of who will consume what. Our routing protocol uses social-relation similarity as a forwarding
    metric, increasing content-replication utilization at intermediate nodes. Simulations show higher delivery ratio and lower overhead than DSDV.
x-posing-free-speech-examining-the-impact-of-moderation-relaxation-on-online-soc:
  title: 'X-posing Free Speech: Examining the Impact of Moderation Relaxation on Online Social Networks'
  tags:
  - online-harm
  methods:
  - networks
  scholar_ids:
  - FYtw3zkAAAAJ:sSrBHYA8nusC
  description: What happened to hate speech on Twitter after Elon Musk's takeover and the relaxation of moderation? On 10 million tweets, we document significant increases in hate targeting LGBTQ+ users
    and liberals, with cohesive hate communities forming around influential 'bridge' users. Ironically, embracing free-speech principles enabled hate against the very concept of free speech itself.
  authors: Arvindh Arun, Saurav Chhatani, Jisun An, Ponnurangam Kumaraguru
  link:
    url: https://doi.org/10.18653/v1/2024.woah-1.15
