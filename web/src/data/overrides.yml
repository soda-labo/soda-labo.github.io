  description: Even if Facebook users see politically diverse articles, do they only share ones that match their views? We test for 'partisan sharing' across individuals, time, and topic importance, and
    find strong evidence it exists. A controlled experiment with 70+ BBC viewers shows partisan sharing distorts perception of reality, but is also associated with more political knowledge.
tower-of-babel-a-crowdsourcing-game-building-sentiment-lexicons-for-resource-sca:
  title: 'Tower of Babel: A Crowdsourcing Game Building Sentiment Lexicons for Resource-scarce Languages'
  tags:
  - user-behavior
  methods:
  - nlp
  - crowdsourced
  link:
    url: https://soda-labo.github.io/downloads/hong2013tower.pdf
    venue: WWW Workshop on Multidisciplinary Approaches to Big Social Data Analysis, 2013
  news:
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/citations?view_op=view_citation&hl=en&user=dcjrz5MAAAAJ&cstart=20&pagesize=80&sortby=pubdate&citation_for_view=dcjrz5MAAAAJ:WF5omc3nYNoC">25+
    papers citing this work (Google scholar)</a>
  authors: Yoonsung Hong, Haewoon Kwak, Youngmin Baek, Sue Moon
  scholar_ids:
  - dcjrz5MAAAAJ:WF5omc3nYNoC
  description: Sentiment analysis needs language-specific lexicons, but non-English languages often lack them. Tower of Babel is a language-independent crowdsourcing game that builds sentiment lexicons
    through play. A 135-participant study finds the game produces accurate classifications, faster than manual annotation and rated as more enjoyable.
  image: tower-of-babel-a-crowdsourcing-game-building-sentiment-lexic.webp
structures-of-broken-ties-exploring-unfollow-behavior-on-twitter:
  title: 'Structures of Broken Ties: Exploring Unfollow Behavior on Twitter'
  tags:
  - networks-influence
  platforms:
  - twitter
  link:
    url: http://dl.acm.org/authorize?6892114
    venue: Proceedings of the 16th ACM Conference on Computer Supported Cooperative Work and Social Computing (CSCW), 2013
  news:
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=16570226745430044928">70+ papers citing this work (Google scholar)</a>
  authors: Bo Xu, Yun Huang, Haewoon Kwak, Noshir S. Contractor
  scholar_ids:
  - dcjrz5MAAAAJ:J_g5lzvAfSwC
  description: 'What makes a Twitter user stop following another? Using actor-oriented modeling (SIENA) on tightly-knit user groups, we find relational properties dominate: mutual following and shared followees
    reduce unfollow likelihood, and unfollows tend to be reciprocal (being unfollowed prompts unfollowing back). Surprisingly, homophily of interests and informativeness of interactions show no measurable
    effect.'
why-individuals-seek-diverse-opinions-or-why-they-don-t:
  title: Why Individuals Seek Diverse Opinions (or Why They Don't)
  tags:
  - beliefs-opinions
  link:
    url: https://dl.acm.org/doi/10.1145/2464464.2464493?cid=99659160512
    venue: Proceedings of the 5th Annual ACM Web Science Conference (WebSci), 2013
  authors: Jisun An, Daniele Quercia, Jon Crowcroft
  scholar_ids:
  - FYtw3zkAAAAJ:RGFaLdJalmkC
  description: Tools that expose people to diverse opinions are pitched as a fact-checking aid, but does anyone want them? Through surveys of 60 people and in-depth interviews of 10 in the UK and South
    Korea, we find people don't equally value opinion diversity, and even the same person benefits only sometimes, depending on prior convictions, emotional state, and social context.
why-do-i-retweet-it-an-information-propagation-model-for-microblogs:
  title: Why Do I Retweet It? An Information Propagation Model for Microblogs
  tags:
  - networks-influence
  methods:
  - networks
  platforms:
  - twitter
  link:
    url: https://soda-labo.github.io/downloads/pezzoni2013why.pdf
    venue: Proceedings of the 5th International Conference on Social Informatics (SocInfo), 2013
  authors: Fabio Pezzoni, Jisun An, Andrea Passarella, Jon Crowcroft, Marco Conti
  scholar_ids:
  - FYtw3zkAAAAJ:SeFeTyx0c_EC
  description: What makes a tweet get retweeted? Combining network structure with user behavior, we find that a message's visibility in a user's incoming flow strongly predicts whether they pass it on,
    but latent traits of the original poster also matter. We turn these findings into a propagation model whose simulated cascades match the empirical ones.
  image: why-do-i-retweet-it-an-information-propagation-model-for-mic.webp
traditional-media-seen-from-social-media:
  title: Traditional Media Seen from Social Media
  tags:
  - news-journalism
  link:
    url: https://dl.acm.org/doi/10.1145/2464464.2464492?cid=99659160512
    venue: Proceedings of the 5th Annual ACM Web Science Conference (WebSci), 2013
  authors: Jisun An, Daniele Quercia, Meeyoung Cha, Krishna Gummadi, Jon Crowcroft
  scholar_ids:
  - FYtw3zkAAAAJ:MXK_kJrjxJIC
  description: 'Twitter exposes who follows which news outlet and how outlets interact through their audiences. Building a map of 77 media outlets from Twitter subscription overlap, we can answer questions
    previously locked in media databases: how much do NYT and WSJ readers overlap? Are outlets competing or complementary? Do friends subscribe to similar outlets?'
fragmented-social-media-a-look-into-selective-exposure-to-political-news:
  title: 'Fragmented Social Media: A Look into Selective Exposure to Political News'
  tags:
  - news-journalism
  link:
    url: https://dl.acm.org/doi/10.1145/2487788.2487807?cid=99659160512
    venue: Proceedings of the 22nd International Conference on World Wide Web (WWW) Companion, 2013
  authors: Jisun An, Daniele Quercia, Jon Crowcroft (poster)
  scholar_ids:
  - FYtw3zkAAAAJ:LkGwnXOMwfcC
  description: Selective exposure has been theoretically promising but hard to test empirically. Looking at news articles shared on Facebook, we find concrete evidence that users predominantly share like-minded
    articles and avoid conflicting ones, with partisans especially so. Building tools to counter this would require identifying partisan users, but the subgroup is demographically indistinguishable from
    the average user.
more-of-a-receiver-than-a-giver-why-do-people-unfollow-in-twitter:
  title: 'More of a Receiver than a Giver: Why Do People Unfollow in Twitter?'
  tags:
  - networks-influence
  platforms:
  - twitter
  link:
    url: https://soda-labo.github.io/downloads/kwak2012more.pdf
    venue: Proceedings of the 6th International AAAI Conference on Weblogs and Social Media (ICWSM), 2012
  news:
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=12122812711251833820">50+ papers citing this work (Google scholar)</a>
  authors: Haewoon Kwak, Sue Moon, Wonjae Lee (4 page poster)
  scholar_ids:
  - dcjrz5MAAAAJ:iH-uZ7U-co4C
  description: 'Why do people unfollow on Twitter? We fit a logistic regression with structural and behavioral features (ego, dyad, and triad properties) on large-scale data, finding 5 structural and 7
    actional variables that significantly predict unfollows. One striking pattern: people are less likely to unfollow accounts that have acknowledged them, even in lopsided communications.'
  image: more-of-a-receiver-than-a-giver-why-do-people-unfollow-in-tw.webp
visualizing-media-bias-through-twitter:
  title: Visualizing Media Bias through Twitter
  tags:
  - bias-fairness
  - news-journalism
  platforms:
  - twitter
  link:
    url: https://www.aaai.org/ocs/index.php/ICWSM/ICWSM12/paper/view/4775
    venue: ICWSM Workshop on the Potential of Social Media Tools and Data for Journalists, 2012
  authors: Jisun An, Meeyoung Cha, Krishna Gummadi, Jon Crowcroft, Daniele Quercia
  scholar_ids:
  - FYtw3zkAAAAJ:RHpTSmoSYBkC
  description: Tracking political bias in news outlets matters for media literacy. We map media sources onto a left-right political spectrum using Twitter co-subscription (who follows which outlet). Analyzing
    7M follow links shows the political split naturally emerges from direct subscription data, and we demonstrate a real-time application visualizing the ideological landscape.
  image: visualizing-media-bias-through-twitter.webp
consistent-community-identification-in-complex-networks:
  title: Consistent Community Identification in Complex Networks
  tags:
  - networks-influence
  methods:
  - networks
  link:
    url: https://soda-labo.github.io/downloads/kwak2011consistent.pdf
    venue: Journal of Korean Physical Society, Vol. 59, No. 5, November 2011.
  authors: Haewoon Kwak, Sue Moon, Young-Ho Eom, Yoonchan Choi, Hawoong Jeong
  scholar_ids:
  - dcjrz5MAAAAJ:aqlVkmm33-oC
  description: Community-detection algorithms tend to return different communities each time you change the input node ordering. We propose two metrics (pairwise membership probability, consistency) and
    use the first as link weights to drive a procedure that converges to consistent communities within six cycles or fewer, without sacrificing modularity.
  image: consistent-community-identification-in-complex-networks.webp
fragile-online-relationship-a-first-look-at-unfollow-dynamics-in-twitter:
  title: 'Fragile Online Relationship: a First Look at Unfollow Dynamics in Twitter'
  tags:
  - networks-influence
  methods:
  - user-study
  platforms:
  - twitter
  image: chi11_kwak.webp
  highlight: true
  description: How often do Twitter users actually unfollow each other? Tracking 1.2M Korean-speaking users daily for 51 days, we find unfollowing is common. Quantitative analysis identifies key factors
    (reciprocity, relationship duration, followees' informativeness, overlap of relationships); 22 interviews reveal users unfollow those who tweet too often, about boring topics, or about mundane life
    details.
  link:
    url: http://dl.acm.org/authorize?419779
    venue: Proceedings of the SIGCHI Conference on Human Factors in Computing Systems (CHI), 2011.
  news:
  - Press coverage - [Kyunghyang Shinmun](http://news.khan.co.kr/kh_news/khan_art_view.html?artid=201112132128435&code=960201)
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/scholar?cites=5916615019466622068&as_sdt=2005&sciodt=0,5&hl=en">150+ papers citing this work (Google scholar)</a>
  authors: Haewoon Kwak, Hyunwoo Chun, Sue Moon
  scholar_ids:
  - dcjrz5MAAAAJ:KlAtU1dfN6UC
media-landscape-in-twitter-a-world-of-new-conventions-and-political-diversity:
  title: 'Media Landscape in Twitter: A World of New Conventions and Political Diversity'
  tags:
  - news-journalism
  - bias-fairness
  platforms:
  - twitter
  image: icwsm11_an.webp
  highlight: true
  description: Who you follow on Twitter shapes which media you see, but indirect exposure (friends who follow outlets, retweets from outside your circle) matters too. Using public follow data, we show
    that indirect exposure expands the political diversity of news a typical user encounters by 60 to 98%, a finding not visible to traditional media research.
  link:
    url: https://ojs.aaai.org/index.php/ICWSM/article/view/14118
    venue: Proceedings of the 5th International AAAI Conference on Weblogs and Social Media (ICWSM), 2011.
  news:
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/scholar?cites=14445905738088978601&as_sdt=800005&sciodt=0,15&hl=en">200+ papers citing this work (Google scholar)</a>
  authors: Jisun An, Meeyoung Cha, Krishna Gummadi, Jon Crowcroft
  scholar_ids:
  - FYtw3zkAAAAJ:GnPB-g6toBAC
what-is-twitter-a-social-network-or-a-news-media:
  title: What is Twitter, a Social Network or a News Media?
  tags:
  - news-journalism
  methods:
  - networks
  platforms:
  - twitter
  image: www10_kwak.webp
  highlight: true
  description: 'Twitter exploded from a nascent microblogging service to over 41M users in just a few years. We crawl the full Twitter graph (1.47B follow relationships, 4,262 trending topics, 106M tweets)
    and characterize its topology and information dynamics, asking whether Twitter behaves more like a social network or a news medium. The finding: more news than network.'
  link:
    url: http://dl.acm.org/authorize?237581
    venue: Proceedings of the 19th international conference on World wide web (WWW), 2010.
  news:
  - Press coverage - [Mashable Op-Ed](https://mashable.com/2010/10/11/facebook-twitter-social/), [ReadWrite](https://readwrite.com/2010/05/11/study_twitter_isnt_very_social/), [The Guardian](https://www.theguardian.com/technology/2010/may/09/john-naughton-twitter-microsoft-research),
    [PC News](https://www.pcworld.com/article/195374/article.html), [Chosun Ilbo](http://businessnews.chosun.com/site/data/html_dir/2010/05/13/2010051300519.html), [DongA Ilbo](https://www.donga.com/news/Economy/Money/article/all/20111210/42505605/1)
  - <a style="color:#FF0000; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=420603684741729498">10k+ papers citing this work (Google scholar)</a>
  authors: Haewoon Kwak, Changhyun Lee, Hosung Park, Sue Moon
  scholar_ids:
  - dcjrz5MAAAAJ:d1gkVwhDpl0C
finding-influentials-based-on-the-temporal-order-of-information-adoption-in-twit:
  title: Finding Influentials based on the Temporal Order of Information Adoption in Twitter
  tags:
  - networks-influence
  platforms:
  - twitter
  link:
    url: http://dl.acm.org/authorize?235691
    venue: Proceedings of the 19th international conference on World wide web (WWW), 2010.
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=ko&cites=12907911141919226818&as_sdt=5">200+ papers citing this work (Google
    scholar)</a>
  authors: Changhyun Lee, Haewoon Kwak, Hosung Park, Sue Moon (poster)
  scholar_ids:
  - dcjrz5MAAAAJ:maZDTaKrznsC
  description: Many methods identify influential Twitter users from follower or retweet counts, but ignore when information actually gets adopted. We propose a method that incorporates both link structure
    and the temporal order of adoption, surfacing a distinct class of influentials that previous methods miss.
understanding-topological-mesoscale-features-in-community-mining:
  title: Understanding Topological Mesoscale Features in Community Mining
  tags:
  - networks-influence
  link:
    url: https://ieeexplore.ieee.org/document/5431994
    venue: Proceedings of the Second International Conference on COMmunication Systems and NETworks (COMSNETS), 2010.
  authors: Sue Moon, Jinyoung You, Haewoon Kwak, Daniel Kim, and Hawoong Jeong (invited paper)
  scholar_ids:
  - dcjrz5MAAAAJ:_Qo2XoVZTnwC
  description: Community-detection algorithms often disagree on which nodes belong where. Building on an iterative-reinforcement approach across 12 real networks, we find about 40% of nodes are grouped
    inconsistently in large social graphs (Orkut, Cyworld). Using participation-coefficient analysis, we classify nodes into seven structural roles and compare two AS networks built from different sources.
analyzing-the-video-popularity-characteristics-of-large-scale-user-generated-con:
  title: Analyzing the Video Popularity Characteristics of Large-Scale User Generated Content Systems
  tags:
  - user-behavior
  link:
    url: https://ieeexplore.ieee.org/document/5431994
    venue: ACM/IEEE Transactions on Networking, Vol 17, Issue 5, 2009
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?rlz=1C5CHFA_enSG927SG927&um=1&ie=UTF-8&lr&cites=11215649147595324791">600+ papers citing
    this work (Google scholar)</a>
  authors: Meeyoung Cha, Haewoon Kwak, Pablo Rodriguez, Yong-Yeol Ahn, and Sue Moon
  scholar_ids:
  - dcjrz5MAAAAJ:HDshCWvjkbEC
  description: User-generated video systems differ fundamentally from traditional video-on-demand. Analyzing YouTube and Korea's Daum Videos, we characterize UGC popularity distributions, the lifetime of
    a video's popularity, and the relationship between requests and content age. We also surface the impact of content aliasing and illegal uploads on ranking accuracy.
mining-communities-in-networks-a-solution-for-consistency-and-its-evaluation:
  title: 'Mining Communities in Networks: a Solution for Consistency and Its Evaluation'
  tags:
  - networks-influence
  methods:
  - networks
  link:
    url: http://dl.acm.org/authorize?256322
    venue: Proceedings of the 9th ACM SIGCOMM conference on Internet measurement (IMC), 2009
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=10763467067488276654,16530488223529021728">90+ papers citing this
    work (Google scholar)</a>
  authors: Haewoon Kwak, Yoonchan Choi, Young-Ho Eom, Hawoong Jeong, Sue Moon
  scholar_ids:
  - dcjrz5MAAAAJ:hC7cP41nSMkC
  description: Three popular community-detection algorithms (CNM, Wakita, Louvain) all return different communities every time you change input node ordering. We propose pairwise membership probability
    as a consistency metric, then use it as link weights in an iterative procedure that converges to consistent communities within six cycles without sacrificing modularity.
the-wisdom-of-the-few-a-collaborative-filtering-approach-based-on-expert-opinion:
  title: 'The Wisdom of the Few: A Collaborative Filtering Approach based on Expert Opinions from the Web'
  tags:
  - beliefs-opinions
  link:
    url: http://dl.acm.org/authorize?107602
    venue: Proceedings of the 32nd international ACM SIGIR conference on Research and development in information retrieval (SIGIR), 2009
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=ko&cites=12105950545188755091">150+ papers citing this work (Google scholar)</a>
  authors: Xavier Amatriaain, Neal Lathia, Josep M. Pujol, Haewoon Kwak, Nuria Oliver
  scholar_ids:
  - dcjrz5MAAAAJ:r0BpntZqJG4C
  description: Standard collaborative filtering suffers from data sparsity, cold start, and noise. We propose computing recommendations from a separate set of expert reviews (instead of the user-rating
    graph itself), weighted by similarity to each user. Validated on Netflix data and a user study where participants preferred our recommendations, the method preserves accuracy while avoiding CF's weaknesses.
connecting-users-with-similar-interests-across-multiple-web-services:
  title: Connecting Users with Similar Interests Across Multiple Web Services
  tags:
  - networks-influence
  link:
    url: https://soda-labo.github.io/downloads/kwak2009connecting.pdf
    venue: Proceedings of the 3rd International AAAI Conference on Weblogs and Social Media (ICWSM), 2009
  authors: Haewoon Kwak, Hwa-Yong Shin, Jong-Il Yoon, Sue Moon (poster)
  scholar_ids:
  - dcjrz5MAAAAJ:M3NEmzRMIkIC
  description: Online services group users with shared interests, but their group-recommendation signals stay siloed inside each service. We propose connecting users across multiple web services through
    their user-labeled tags, which carry less privacy risk and stay fresher than profile data. A vector-space model with intra-personomy normalization finds similar users effectively across six services.
  image: connecting-users-with-similar-interests-across-multiple-web-.webp
comparison-of-online-social-relations-in-volume-vs-interaction-a-case-study-of-c:
  title: 'Comparison of Online Social Relations in Volume vs Interaction: A Case Study of Cyworld'
  tags:
  - networks-influence
  methods:
  - user-study
  link:
    url: http://dl.acm.org/authorize?037715
    venue: Proceedings of the 8th ACM SIGCOMM conference on Internet measurement (IMC), 2008
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?oi=bibs&hl=en&cites=16920983580300166416">250+ papers citing this work (Google scholar)</a>
  authors: Hyunwoo Chun, Haewoon Kwak, Young-Ho Eom, Yong-Yeol Ahn, Sue Moon, and Hawoong Jeong
  scholar_ids:
  - dcjrz5MAAAAJ:70eg2SAEIzsC
  description: 'Is a Cyworld ''friend'' an active relationship or just a declaration? We compare friend-list networks against activity networks formed by actual guestbook comments. The two have similar
    topology, but only the activity network (with reciprocated comments as edges) behaves like a true social network: more assortative, with fewer artificially dense cores.'
i-tube-you-tube-everybody-tubes-analyzing-the-world-s-largest-user-generated-con:
  title: 'I Tube, You Tube, Everybody Tubes: Analyzing the World''s Largest User Generated Content Video System'
  tags:
  - user-behavior
  link:
    url: http://dl.acm.org/authorize?916072
    venue: Proceedings of the 7th ACM SIGCOMM conference on Internet measurement (IMC), 2009
  news:
  - Best paper award, [The IMC Test of Time Award](https://www.sigcomm.org/awards/IMC-test-of-time-award)
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?cites=10792240042294166454&as_sdt=2005&sciodt=0,5&hl=en">2,200+ papers citing this work
    (Google scholar)</a>
  authors: Meeyoung Cha, Haewoon Kwak, Pablo Rodriguez, Yong-Yeol Ahn, Sue Moon
  scholar_ids:
  - dcjrz5MAAAAJ:-f6ydRqryjwC
  description: YouTube reshaped how people make and watch video, and traditional video-on-demand metrics don't apply. We analyze the world's largest user-generated content video system, characterizing the
    popularity distributions, lifetimes, and request patterns of user-uploaded videos, with implications for caching, monetization, and platform design.
analysis-of-topological-characteristics-of-huge-online-social-networking-service:
  title: Analysis of topological characteristics of huge online social networking services
  tags:
  - networks-influence
  methods:
  - networks
  link:
    url: http://dl.acm.org/authorize?968490
    venue: Proceedings of the 16th international conference on World Wide Web (WWW), 2007
  news:
  - <a style="color:#FF0000; font-weight:normal; text-decoration:underline" href="https://scholar.google.com/scholar?cites=9872765684557150192&as_sdt=2005&sciodt=0,5&hl=en">1,400+ papers citing this work
    (Google scholar)</a>
  authors: Yong-Yeol Ahn, Seungyeop Han, Haewoon Kwak, Sue Moon, Hawoong Jeong
  scholar_ids:
  - dcjrz5MAAAAJ:L8Ckcad2t8MC
  description: Do online relationships behave like real-life ones? We compare three online social networks of 10M+ users each (Cyworld, MySpace, orkut), analyzing degree distribution, clustering, and degree
    correlation. Cyworld's distribution shifts toward multi-scaling over time; the three networks differ in scaling exponents, and certain online behaviors diverge from real-life social patterns.
customer-segmentation-using-online-platforms-isolating-behavioral-and-demographi:
  title: 'Customer segmentation using online platforms: isolating behavioral and demographic segments for persona creation via aggregated user data'
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:l7t_Zn2s7bgC
  - FYtw3zkAAAAJ:lSLTfruPkqcC
are-personas-done-evaluating-the-usefulness-of-personas-in-the-age-of-online-ana:
  title: 'Are personas done?: Evaluating the usefulness of personas in the age of online analytics'
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:WqliGbK-hY8C
  - FYtw3zkAAAAJ:3fE2CSJIrl8C
  description: 'Has the rise of real-time online analytics made personas obsolete? We weigh the arguments for and against persona use in an age of fine-grained user data, and argue that data-driven personas
    occupy a useful middle ground: capturing the breadth of aggregate analytics while keeping the interpretability of individual-level profiles. We sketch how persona practice must evolve to survive.'
automatic-persona-generation-apg-a-rationale-and-demonstration:
  title: Automatic Persona Generation (APG) A Rationale and Demonstration
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:738O_yMBCRsC
  - FYtw3zkAAAAJ:-f6ydRqryjwC
  description: How can personas evolve from static descriptive artifacts into living analytics tools? We present a conceptual framework around persona benefits, analytics benefits, and decision-making outcomes,
    then demonstrate it on digital-marketing use cases, including a working data-driven persona system where each profile serves as an interface to underlying user data.
persona-perception-scale-developing-and-validating-an-instrument-for-human-like-:
  title: 'Persona perception scale: Developing and validating an instrument for human-like representations of data'
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:mB3voiENLucC
  - FYtw3zkAAAAJ:_Qo2XoVZTnwC
  description: Personas are widely used in HCI and design but lack validated measurement scales. We propose a persona perception scale based on relevant literature and validate it through a pilot study
    (19 participants, 57 evaluations). Factor loadings (0.60 to 0.95) and Cronbach's alpha indicate the scale performs satisfactorily, the first systematic instrument for measuring persona perception.
confusion-and-information-triggered-by-photos-in-persona-profiles:
  title: Confusion and information triggered by photos in persona profiles
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:_xSYboBqXhAC
  - FYtw3zkAAAAJ:iH-uZ7U-co4C
  description: 'Do additional photos make a persona profile clearer or just confusing? Through eye-tracking and interviews with content creators, we compare three persona variants: a single headshot, a
    headshot plus contextual photos of the persona, and a headshot plus photos of different people. Contextual photos add information; photos of different people just confuse.'
from-2-772-segments-to-five-personas-summarizing-a-diverse-online-audience-by-ge:
  title: 'From 2,772 segments to five personas: Summarizing a diverse online audience by generating culturally adapted personas'
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:XiSMed-E-HIC
  - FYtw3zkAAAAJ:hqOjcs7Dif8C
  description: 'From 2,772 raw audience segments to five recognizable personas: we use computational analysis of millions of YouTube interactions for a Middle Eastern media outlet, then enrich with qualitative
    interview data to produce culturally adapted persona profiles. The method shows how to summarize complex social analytics into human portraits that real organizations can actually use.'
towards-automatic-persona-generation-using-social-media:
  title: Towards automatic persona generation using social media
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:UebtZRa9Y70C
  - FYtw3zkAAAAJ:0EnyYjriUFMC
  description: Building on real-time persona generation, we integrate signals from Facebook (link sharing by 54K followers), Twitter (195K follower profiles), and YouTube (188K subscriber profiles plus
    millions of interactions) for a single media organization. The combined view yields richer personas than any platform alone, useful for marketing, topic interest, and feature prioritization.
automatic-persona-generation-for-online-content-creators-conceptual-rationale-an:
  title: 'Automatic persona generation for online content creators: Conceptual rationale and a research agenda'
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:8AbLer7MMksC
  - FYtw3zkAAAAJ:Wp0gIr-vW9MC
investigating-toxicity-across-multiple-reddit-communities-users-and-moderators:
  title: Investigating toxicity across multiple Reddit communities, users, and moderators
  tags:
  - online-harm
  platforms:
  - reddit
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:ye4kPcJQO24C
  description: Reddit moderators struggle with toxic comments at scale. We combine state-of-the-art toxic-comment detection with toxicity-trigger detection, then investigate how toxic posting behavior varies
    across communities, and consolidate our findings with input from Reddit moderators themselves.
method-for-predicting-reactiveness-of-users-of-mobile-devices-for-mobile-messagi:
  title: Method for predicting reactiveness of users of mobile devices for mobile messaging
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:TFP_iSt0sucC
confusion-prediction-from-eye-tracking-data-experiments-with-machine-learning:
  title: 'Confusion Prediction from Eye-Tracking Data: Experiments with Machine Learning'
  tags:
  - user-behavior
  methods:
  - user-study
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:KxtntwgDAa4C
  - FYtw3zkAAAAJ:ULOm3_A8WrAC
  description: Eye movements may hint at user confusion. We train a random forest on fixation-level features from eye-tracking and think-aloud data, predicting user confusion with over 70% accuracy. Adding
    age and gender lifts accuracy past 90%, and SMOTE class-balancing provides the strongest boost. Useful for adapting websites, mobile apps, and VR interfaces.
automatically-conceptualizing-social-media-analytics-data-via-personas:
  title: Automatically conceptualizing social media analytics data via personas
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:OU6Ihb5iCvQC
  - FYtw3zkAAAAJ:Y0pCki6q_DkC
  description: Social-media analytics is data-rich but hard for organizations to act on. APG (Automatic Persona Generation) is an operational system that processes tens of millions of user interactions
    across Facebook and YouTube into auto-generated persona profiles complete with names, photos, and interests. The system is deployed across multiple industry verticals and online at persona.qcri.org.
automatic-generation-of-personas-using-youtube-social-media-data:
  title: Automatic generation of personas using youtube social media data
  tags:
  - user-behavior
  platforms:
  - youtube
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:M05iB0D1s5AC
  - FYtw3zkAAAAJ:ldfaerwXgEUC
  description: 'We build personas in real time from a YouTube channel of a global media corporation, working with 188K+ subscriber profiles and 30M+ interactions. To enrich the personas, we cross-match
    user data from other social-media channels and merge them. The result: real-time, multi-platform personas that replace laborious manual development.'
investigating-toxicity-changes-of-cross-community-redditors-from-2-billion-posts:
  title: Investigating toxicity changes of cross-community redditors from 2 billion posts and comments
  tags:
  - online-harm
  platforms:
  - reddit
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:Mojj43d5GZwC
  description: Do Reddit users behave more toxically in some communities than in others? Using a fine-tuned BERT (91% accuracy, AUC 0.96), we score the toxicity of 2.2 billion comments and 87 million posts
    from 890K users across 16 years. About a third of posters and 81% of commenters change their toxicity across communities, they adapt to local norms.
validating-social-media-data-for-automatic-persona-generation:
  title: Validating social media data for automatic persona generation
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:eq2jaN3J8jMC
  - FYtw3zkAAAAJ:u-x6o8ySG0sC
  description: Can social-media data reliably generate accurate, distinct personas in real time? We test the approach on 188K subscribers and 30M+ interactions of a global media corporation's YouTube channel,
    finding that gender and age can be used to create statistically distinct segments, though the resulting personas are biased by the content the channel produces.
provoke-toxicity-trigger-detection-in-conversations-from-the-top-100-subreddits:
  title: 'PROVOKE: Toxicity trigger detection in conversations from the top 100 subreddits'
  tags:
  - online-harm
  platforms:
  - reddit
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:AXPGKjj_ei8C
  description: What turns a Reddit conversation toxic? We collect 991,806 conversation threads from the top 100 subreddits, label toxicity with a fine-tuned BERT (AUC 0.98), and identify the 'trigger' comments
    that flip a thread. A trigger-detection model (AUC 0.79) combining sentiment shift, topic shift, and context surfaces both universal trigger words and community-specific ones.
findings-of-a-user-study-of-automatically-generated-personas:
  title: Findings of a user study of automatically generated personas
  tags:
  - user-behavior
  methods:
  - user-study
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:u9iWguZQMMsC
  - FYtw3zkAAAAJ:WF5omc3nYNoC
  description: What do decision-makers actually do with an Automatic Persona Generation system at work? In a 13-participant semi-naturalistic study at a major international corporation (using mouse tracking,
    surveys, and interviews), the system kept personas at the forefront of decisions and met information needs by combining narratives with underlying numerical data.
inferring-social-media-users-demographics-from-profile-pictures-a-face-analysis-:
  title: 'Inferring social media users’ demographics from profile pictures: A Face++ analysis on Twitter users'
  tags:
  - user-behavior
  platforms:
  - twitter
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:YsMSGLbcyi4C
  - FYtw3zkAAAAJ:eQOLeE2rZwMC
viewed-by-too-many-or-viewed-too-little-using-information-dissemination-for-audi:
  title: 'Viewed by too many or viewed too little: Using information dissemination for audience segmentation'
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:VL0QpB8kHFEC
  - FYtw3zkAAAAJ:35N4QoGY0k4C
  description: Some online content is so widely seen it tells you nothing about audience segments; other content is highly segment-specific but barely watched. We characterize 4,320 videos and 58M interactions
    to identify the content that is both discriminating and impactful, useful cutoffs for picking which videos to feed into persona generation and audience analysis.
impact-of-snowball-sampling-ratios-on-network-characteristics-estimation-a-case-:
  title: 'Impact of snowball sampling ratios on network characteristics estimation: A case study of cyworld'
  tags:
  - networks-influence
  methods:
  - networks
  - user-study
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:ufrVoPGSRksC
  description: When you can't crawl the whole graph, snowball sampling is a common shortcut. Using Cyworld's complete ilchon network as ground truth, we measure how close key topological characteristics
    (degree distribution, correlation, assortativity, clustering coefficient) of snowball-sampled networks get to the true values as a function of sampling ratio.
influentials-ranking-in-social-networks:
  title: Influentials ranking in social networks
  tags:
  - networks-influence
  methods:
  - networks
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:ZeXyd9-uunAC
  description: 'Who really matters in a social network: those with the most followers, or those whose moves trigger others? We propose a Temporal Influence Ranking (TIR) model that combines PageRank with
    the order in which information is adopted. The biased random walk uses logistic-regression-predicted transitions, identifying more stable, more useful influencers than purely structural baselines.'
contours-of-virtual-enfreakment-in-fighting-game-characters:
  title: Contours of virtual enfreakment in fighting game characters
  tags:
  - user-behavior
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:HE397vMXCloC
  description: 'Fighting-game characters (Street Fighter, Tekken) tend toward ''virtual enfreakment'': exaggerated bodies, costumes, and styles meant to be exotic and easily distinguishable. Through crowdsourced
    surveys and mechanical analyses, we map how that exaggeration differs by gender, national origin, and skin color, and find systematic racism and sexism baked into character design.'
understanding-toxic-behavior-in-online-games:
  title: Understanding toxic behavior in online games
  tags:
  - online-harm
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:u5HHmVD_uO8C
  description: Online games have grown into rich social environments with predefined actions (friendship, communication, trade, aggression, punishment) and detailed server logs. These electronic footprints
    make online games invaluable for studying social dynamics, especially the conditions under which positive interactions tip into negative ones.
statistical-modeling-of-harassment-against-reddit-moderators:
  title: Statistical Modeling of Harassment against Reddit Moderators
  tags:
  - online-harm
  platforms:
  - reddit
  hide: true
  scholar_ids:
  - dcjrz5MAAAAJ:vRqMK49ujn8C
  description: Reddit moderators are volunteers, but often become targets of harassment from the very users they manage. Analyzing survey responses from 1,818 Reddit moderators, we build a statistical model
    that identifies six significant factors driving harassment, with knowledge of community norms (counterintuitively) being the strongest. Vulnerable moderators in toxic communities need direct support.
benchmarking-zero-shot-stance-detection-with-flant5-xxl-insights-from-training-d:
  title: 'Benchmarking zero-shot stance detection with FlanT5-XXL: Insights from training data, prompting, and decoding strategies into its near-SoTA performance'
  tags:
  - llms-responsible-ai
  methods:
  - llm
  - nlp
  - dataset
  scholar_ids:
  - dcjrz5MAAAAJ:hkOj_22Ku90C
  - FYtw3zkAAAAJ:tS2w5q8j5-wC
  description: Can LLMs do stance detection on tweets without any fine-tuning? Using FlanT5-XXL with SemEval 2016 and P-Stance, zero-shot prompting matches or beats fine-tuned baselines. We trace how performance
    varies with prompt phrasing, decoding strategy, and prompt perplexity, and identify a positivity bias that partially explains performance differences across decoding strategies.
  authors: Rachith Aiyappa, Shruthi Senthilmani, Jisun An, Haewoon Kwak, Yong-Yeol Ahn
  link:
    url: https://arxiv.org/abs/2403.00236
    venue: arXiv (Cornell University)
  image: benchmarking-zero-shot-stance-detection-with-flant5-xxl-insi.webp
recommender-system-based-on-expert-opinions:
  title: Recommender system based on expert opinions
  tags:
